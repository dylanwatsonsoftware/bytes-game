<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- Shirt / body (bottom half) -->
  <ellipse cx="250" cy="490" rx="150" ry="55" fill="#4488DD"/>
  <rect x="100" y="410" width="300" height="100" fill="#4488DD"/>
  <ellipse cx="250" cy="410" rx="150" ry="45" fill="#4488DD"/>
  <!-- Collar -->
  <path d="M 218 390 L 250 420 L 282 390" fill="white" opacity="0.25"/>

  <!-- Neck -->
  <rect x="216" y="358" width="68" height="52" rx="10" fill="#F2BE7E"/>

  <!-- Hair (behind face) -->
  <circle cx="250" cy="188" r="170" fill="#C47525"/>

  <!-- Face -->
  <ellipse cx="250" cy="222" rx="150" ry="165" fill="#F2BE7E"/>

  <!-- Ears -->
  <ellipse cx="98" cy="238" rx="22" ry="28" fill="#F2BE7E"/>
  <ellipse cx="402" cy="238" rx="22" ry="28" fill="#F2BE7E"/>
  <ellipse cx="98" cy="238" rx="12" ry="18" fill="#E0A060" opacity="0.55"/>
  <ellipse cx="402" cy="238" rx="12" ry="18" fill="#E0A060" opacity="0.55"/>

  <!-- Hair fringe (on top of forehead) -->
  <ellipse cx="250" cy="70" rx="150" ry="75" fill="#C47525"/>
  <path d="M 145 128 Q 172 85 210 118" fill="#C47525"/>
  <path d="M 355 128 Q 328 85 290 118" fill="#C47525"/>

  <!-- Eyebrows -->
  <path d="M 172 177 Q 200 165 227 175" stroke="#9A5018" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 273 175 Q 300 165 328 177" stroke="#9A5018" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="200" cy="205" rx="28" ry="24" fill="white"/>
  <circle cx="204" cy="208" r="15" fill="#4A80CC"/>
  <circle cx="206" cy="210" r="8.5" fill="#111122"/>
  <circle cx="211" cy="205" r="4" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="300" cy="205" rx="28" ry="24" fill="white"/>
  <circle cx="296" cy="208" r="15" fill="#4A80CC"/>
  <circle cx="294" cy="210" r="8.5" fill="#111122"/>
  <circle cx="299" cy="205" r="4" fill="white"/>

  <!-- Nose -->
  <path d="M 241 232 Q 250 246 259 232" stroke="#D0925A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="242" cy="242" rx="5" ry="4" fill="#D0925A" opacity="0.7"/>
  <ellipse cx="258" cy="242" rx="5" ry="4" fill="#D0925A" opacity="0.7"/>

  <!-- Rosy cheeks -->
  <ellipse cx="148" cy="262" rx="29" ry="17" fill="#FF9980" opacity="0.36"/>
  <ellipse cx="352" cy="262" rx="29" ry="17" fill="#FF9980" opacity="0.36"/>

  <!-- MOUTH — centred on split line y=250 -->
  <!-- Upper lip + top teeth -->
  <path d="M 208 250 Q 230 238 250 242 Q 270 238 292 250 Q 250 254 208 250 Z" fill="#C05040"/>
  <rect x="215" y="243" width="70" height="11" rx="4" fill="#FFFFF4"/>

  <!-- Lower lip + bottom teeth -->
  <path d="M 208 250 Q 250 269 292 250 Q 250 254 208 250 Z" fill="#A83C30"/>
  <rect x="215" y="250" width="70" height="10" rx="4" fill="#FFFFF4" opacity="0.88"/>

  <!-- Mouth corner dimples -->
  <circle cx="208" cy="250" r="4.5" fill="#D06050" opacity="0.5"/>
  <circle cx="292" cy="250" r="4.5" fill="#D06050" opacity="0.5"/>
</svg>
